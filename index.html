<!DOCTYPE html>
<html lang="en">
<head>
    <title>Quest 3S - Hand Flip Demo</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background-color: #000; }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';
        import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';
        import { XRHandModelFactory } from 'three/addons/webxr/XRHandModelFactory.js';

        let scene, camera, renderer, card;
        let isFlipped = false;
        let targetRotation = 0;

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x202020);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 10);
            camera.position.set(0, 1.6, 3);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // Lights
            const light = new THREE.HemisphereLight(0xffffff, 0x444444, 3);
            scene.add(light);

            // --- THE CARD ---
            card = new THREE.Group();
            
            // Front of Card (Canvas Texture for Text)
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512; canvas.height = 256;
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, 512, 256);
            ctx.fillStyle = 'black';
            ctx.font = 'Bold 80px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('HELLO', 256, 150);
            const textTexture = new THREE.CanvasTexture(canvas);

            const frontGeo = new THREE.PlaneGeometry(0.5, 0.3);
            const frontMat = new THREE.MeshStandardMaterial({ map: textTexture });
            const frontMesh = new THREE.Mesh(frontGeo, frontMat);
            card.add(frontMesh);

            // Back of Card (Wireframe)
            const backMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true, side: THREE.BackSide });
            const backMesh = new THREE.Mesh(frontGeo, backMat);
            // Slightly offset to prevent z-fighting
            backMesh.position.z = -0.001; 
            card.add(backMesh);

            card.position.set(0, 1.5, -1); // 1.5m high, 1m in front
            scene.add(card);

            // --- HANDS & INTERACTION ---
            const controllerModelFactory = new XRControllerModelFactory();
            const handModelFactory = new XRHandModelFactory();

            // Setup Hand 1 & 2
            for (let i = 0; i < 2; i++) {
                const controller = renderer.xr.getController(i);
                scene.add(controller);

                // This triggers when you "pinch" with hands or pull trigger on controller
                controller.addEventListener('selectstart', onSelect);

                const hand = renderer.xr.getHand(i);
                hand.add(handModelFactory.createHandModel(hand, "mesh"));
                scene.add(hand);
            }

            renderer.setAnimationLoop(render);
        }

        function onSelect() {
            // When user pinches, toggle the flip state
            isFlipped = !isFlipped;
            targetRotation = isFlipped ? Math.PI : 0;
        }

        function render() {
            // Smoothly rotate the card
            card.rotation.y = THREE.MathUtils.lerp(card.rotation.y, targetRotation, 0.1);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
